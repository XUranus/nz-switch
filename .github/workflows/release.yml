name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 构建桌面应用 (Tauri) ─────────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_toolchain: stable
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_toolchain: stable
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_toolchain: stable
          - platform: macos-latest
            target: x86_64-apple-darwin
            rust_toolchain: stable

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_toolchain }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: gui

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "nz-switch ${{ github.ref_name }}"
          releaseBody: |
            ## nz-switch ${{ github.ref_name }}

            一键切换中国内地开发环境 — 管理镜像源、代理、环境变量、DNS、Git 配置

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Linux (x86_64) | `.AppImage` / `.deb` / `.rpm` |
            | Windows (x86_64) | `.msi` / `.exe` |
            | macOS (Intel) | `.dmg` / `.app.tar.gz` |
            | macOS (Apple Silicon) | `.dmg` / `.app.tar.gz` |
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      # 剥离 AppImage 中冲突的 GPU 库，避免与宿主机驱动版本不匹配导致 EGL_BAD_ALLOC
      - name: Strip GPU libs from AppImage (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # 安装 FUSE (appimagetool 运行需要)
          sudo apt-get install -y libfuse2

          # 下载 appimagetool 到固定路径
          curl -fsSL -o /tmp/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool

          cd src-tauri/target/${{ matrix.target }}/release/bundle/appimage
          APPIMAGE=$(ls *.AppImage | head -1)
          [ -z "$APPIMAGE" ] && exit 0
          ./"$APPIMAGE" --appimage-extract
          find squashfs-root -name "libwayland-*.so*" -delete
          find squashfs-root -name "libEGL.so*" -delete
          find squashfs-root -name "libGL.so*" -delete
          /tmp/appimagetool squashfs-root "$APPIMAGE"
          rm -rf squashfs-root
        env:
          ARCH: x86_64

      # 重新上传剥离后的 AppImage（覆盖 tauri-action 上传的版本）
      - name: Re-upload stripped AppImage (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 构建 CLI 二进制 ─────────────────────────────────────────────
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../nz-switch-cli-${{ matrix.target }}.tar.gz nz-switch
          cd ../../..

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../nz-switch-cli-${{ matrix.target }}.zip nz-switch.exe
          cd ../../..

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: nz-switch-cli-${{ matrix.target }}.*

  # ─── 发布 CLI 到 Release ─────────────────────────────────────────
  publish-cli:
    needs: [build-cli, build-desktop]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/nz-switch-cli-*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
